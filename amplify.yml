# AWS Amplify Hosting build specification (GitHub App connection).
# In the Amplify console: connect repo NickBaynham/calgentik, select this branch mapping:
#   main    → production
#   develop → staging (create a second Amplify branch or use branch subdomains)
# Feature branches → enable "Pull request previews" in Amplify for preview URLs.
#
# Docs: guides/aws-amplify.md

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # `next.config.ts` redirects `/resources/:file` → S3 only when this is set at build time.
        # Default matches the production media bucket (override in Amplify → Environment variables).
        - export NEXT_PUBLIC_MEDIA_BASE_URL="${NEXT_PUBLIC_MEDIA_BASE_URL:-https://calgentik-media.s3.us-east-1.amazonaws.com}"
        - export MEDIA_BASE_URL="${MEDIA_BASE_URL:-$NEXT_PUBLIC_MEDIA_BASE_URL}"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
